<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Log de Auditoría</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2>Log del Sistema</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Mensaje</th>
            </tr>
        </thead>
        <tbody>
            <tr data-th-each="log : ${logs}">
                <td data-th-text="${log.id}">1</td>
                <td data-th-text="${log.fecha}">2023-01-01</td>
                <td data-th-text="${log.mensaje}">Mensaje de prueba</td>
            </tr>
        </tbody>
    </table>
    <a href="/t5-admin-fotos" class="btn btn-secondary">Volver a Fotos</a>
</body>
</html>
