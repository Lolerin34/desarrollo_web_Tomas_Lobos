<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agregar aviso - Fundación Patitas</title>
  <link rel="stylesheet" href="/css/Fp_formulario.css" data-th-href="@{/css/Fp_formulario.css}">
</head>

<body>
  <div class="navbar">
    <img id="logo" src="/img/Fundacion_patitas.svg" data-th-src="@{/img/Fundacion_patitas.svg}" alt="Logo">
    <h1>Fundación Patitas</h1>
    <a href="/" data-th-href="@{/}" class="btn-nav">Página principal</a>
    <a href="/formulario" data-th-href="@{/formulario}" class="btn-nav active">Agregar aviso</a>
    <a href="/listado" data-th-href="@{/listado}" class="btn-nav">Listado</a>
    <a href="/estadisticas" data-th-href="@{/estadisticas}" class="btn-nav">Estadísticas</a>
  </div>

  <main>
    <div class="main-container">
      <form id="form-aviso" class="formulario" method="POST" action="/aviso/guardar" data-th-action="@{/aviso/guardar}">
        
        <h2>¿Dónde?</h2>
        <label for="region">Región</label>
        <select id="region" name="region">
          <option value="">Seleccione una región</option>
          <option data-th-each="reg : ${regiones}" data-th-value="${reg.id}" data-th-text="${reg.nombre}">Metropolitana</option>
        </select>

        <label for="comuna">Comuna</label>
        <select id="comuna" name="comunaId" required> 
            <option value="1">Santiago (Ejemplo)</option>
        </select>

        <label for="sector">Sector</label>
        <input id="sector" name="sector" type="text">

        <h2>Contacto</h2>
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" type="text" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="celular">Celular</label>
        <input id="celular" name="celular" type="tel">

        <h2>Mascota</h2>
        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo" required>
          <option value="gato">Gato</option>
          <option value="perro">Perro</option>
        </select>

        <label for="cantidad">Cantidad</label>
        <input id="cantidad" name="cantidad" type="number" min="1" required>

        <label for="edad">Edad</label>
        <input id="edad" name="edad" type="number" min="1" required>

        <label for="unidad">Unidad</label>
        <select id="unidad" name="unidadMedida" required>
          <option value="meses">Meses</option>
          <option value="años">Años</option>
        </select>

        <label for="fecha">Fecha de entrega</label>
        <input type="text" id="fecha" name="fechaEntrega" placeholder="YYYY-MM-DD" required>

        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" cols="50" rows="6"></textarea>

        <div class="form-actions">
          <button type="submit" id="submit-btn">Agregar aviso</button>
        </div>
      </form>
    </div>
  </main>
  <script src="/js/Fp_navbar.js" data-th-src="@{/js/Fp_navbar.js}"></script>
  <script src="/js/Fp_formulario.js" data-th-src="@{/js/Fp_formulario.js}"></script>
</body>
</html>
